<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 | 블루에듀</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #F4F8FF;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 52px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .check {
      width: 72px; height: 72px;
      background: #2E6DB4;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 2rem;
      color: #fff;
    }
    h1 { font-size: 1.6rem; font-weight: 900; color: #1B3A6B; margin-bottom: 12px; }
    p  { color: #666; font-size: .95rem; line-height: 1.8; margin-bottom: 8px; }
    .highlight {
      background: #F4F8FF;
      border-radius: 10px;
      padding: 20px;
      margin: 24px 0;
      font-size: .92rem;
      color: #333;
      line-height: 1.9;
    }
    .highlight strong { color: #1B3A6B; }
    a.btn {
      display: inline-block;
      margin-top: 8px;
      padding: 14px 36px;
      background: #D4A843;
      color: #fff;
      border-radius: 50px;
      font-weight: 700;
      font-size: .95rem;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>결제가 완료됐습니다!</h1>
    <p>입력하신 이메일로 PDF 다운로드 링크를 발송했습니다.<br />5분 이내에 도착하지 않으면 스팸함을 확인해주세요.</p>
    <div class="highlight">
      <strong>📧 PDF 전달 안내</strong><br />
      결제 시 입력하신 이메일로 발송됩니다.<br /><br />
      <strong>💬 코칭 패키지 안내 (DELUXE / PREMIUM)</strong><br />
      24시간 이내에 카카오톡으로 일정 안내드립니다.<br />
      문의: hys7628@naver.com
    </div>
    <a href="/" class="btn">홈으로 돌아가기</a>
  </div>
</body>
</html>
